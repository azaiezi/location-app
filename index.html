<script>
// ══════════════════════════════════════════
// CONSTANTS & STATE (identiques + petites améliorations)
// ══════════════════════════════════════════
const APT_IDS = ['APT1','APT2','APT3','APT4','APT5','APT6','APT7','APT8','APTA','APTB','APTC','APTD','APTE','APTF','APTG'];

const STATUS_COLOR = { paid:'#22c55e', advance:'#eab308', unpaid:'#ef4444', cancelled:'#6b7280' };
const STATUS_CLASS = { paid:'badge-paid', advance:'badge-advance', unpaid:'badge-unpaid', cancelled:'badge-cancelled' };
const STATUS_LABEL = { paid:'Payé', advance:'Avance', unpaid:'Non payé', cancelled:'Annulé' };
const STATUS_CSS_CLASS = { paid:'status-paid', advance:'status-advance', unpaid:'status-unpaid', cancelled:'status-cancelled' };

let reservations = [];
let aptConfig = {};
let calStartDate = new Date();
let calDays = 7;
let currentTab = 'cal';
let editingResId = null;
let statusTargetId = null;
let confirmCallback = null;

// === STORAGE, DATE HELPERS, CONFLICT CHECK (identiques) ===
/* ... (code identique à votre version) ... */

// ══════════════════════════════════════════
// CALENDAR RENDER – VERSION AMÉLIORÉE
// ══════════════════════════════════════════
function renderCalendar() {
  const start = toISO(calStartDate);
  const days = Array.from({length: calDays}, (_, i) => toISO(addDays(calStartDate, i)));

  document.getElementById('week-label').textContent = 
    `${fmtShort(start)} – ${fmtShort(days[days.length-1])} ${calStartDate.getFullYear()}`;

  const today = toISO(new Date());
  const grid = document.getElementById('cal-grid');
  grid.style.gridTemplateColumns = `72px repeat(${calDays}, minmax(44px,1fr))`;

  let html = '';

  // Header
  html += `<div class="cal-corner">${MONTH_NAMES[calStartDate.getMonth()]}</div>`;
  days.forEach(d => {
    const dt = parseDate(d);
    const isToday = d === today;
    html += `<div class="cal-day-head${isToday?' today':''}">
      <div>${DAY_NAMES[dt.getDay()]}</div>
      <div class="day-num">${dt.getDate()}</div>
    </div>`;
  });

  // Rows par appartement
  APT_IDS.forEach(aptId => {
    const cfg = aptConfig[aptId] || {price:100, capacity:''};
    html += `<div class="cal-apt-label">${aptId}<span>${cfg.price?cfg.price+' DT':''}</span></div>`;

    const aptResas = reservations.filter(r => 
      r.apt === aptId && r.status !== 'cancelled' &&
      r.from <= days[days.length-1] && r.to > days[0]
    );

    days.forEach((d, di) => {
      const isToday = d === today;
      const resa = aptResas.find(r => r.from <= d && r.to > d);

      if (resa) {
        const visFrom = resa.from < days[0] ? days[0] : resa.from;
        if (d === visFrom) {
          const spanDays = Math.min(diffDays(visFrom, resa.to), days.length - di);
          html += `<div class="cal-cell${isToday?' today-col':''}" style="position:relative" onclick="handleCellClick('${aptId}','${d}')">
            <div class="res-span ${STATUS_CSS_CLASS[resa.status]}" 
                 style="width:calc(${spanDays} * 100% + ${spanDays-1} * 1px);"
                 onclick="event.stopImmediatePropagation();openEdit('${resa.id}')"
                 title="${resa.prenom} ${resa.nom} | ${fmtFull(resa.from)}→${fmtFull(resa.to)}">
              ${resa.prenom} ${resa.nom}
            </div>
          </div>`;
        } else {
          html += `<div class="cal-cell${isToday?' today-col':''}" style="background:rgba(59,130,246,0.05)" onclick="event.stopImmediatePropagation();openEdit('${resa.id}')"></div>`;
        }
      } else {
        html += `<div class="cal-cell${isToday?' today-col':''}" onclick="handleCellClick('${aptId}','${d}')"></div>`;
      }
    });
  });

  grid.innerHTML = html;
}

// ══════════════════════════════════════════
// FORM – Ajout vérification capacité
// ══════════════════════════════════════════
function calcTotal() {
  const aptId = document.getElementById('f-apt').value;
  const from  = document.getElementById('f-from').value;
  const to    = document.getElementById('f-to').value;
  const persons = parseInt(document.getElementById('f-persons').value) || 1;
  const cfg = aptConfig[aptId] || {};

  if (aptId && from && to && from < to) {
    const nights = diffDays(from, to);
    const auto = nights * (cfg.price || 0);
    document.getElementById('f-calc').innerHTML = 
      `${nights} nuit(s) × ${cfg.price||0} DT = <strong>${auto} DT</strong>`;

    // Vérification capacité
    if (cfg.capacity && persons > parseInt(cfg.capacity)) {
      document.getElementById('f-calc').innerHTML += `<br><span style="color:var(--red)">⚠️ Capacité dépassée (${cfg.capacity} pers. max)</span>`;
    }

    if (!document.getElementById('f-total').value || document.getElementById('f-total').dataset.auto === '1') {
      document.getElementById('f-total').value = auto;
      document.getElementById('f-total').dataset.auto = '1';
    }
  } else {
    document.getElementById('f-calc').textContent = 'Sélectionnez un appartement et des dates';
  }
}

// Le reste du script (saveReservation, renderList, renderStats, etc.) reste IDENTIQUE à votre version originale.

function init() {
  loadData();
  // ... (le reste de l'init est identique)
}

init();
</script>
